<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edge Test RED</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #444; overflow: hidden; touch-action: none; }
        
        /* 1. 最底層：畫布 */
        #c { position: fixed; top: 0; left: 0; z-index: 1; }

        /* 2. 中間層：白色方塊 */
        .box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60vmin; height: 60vmin; background: white; z-index: 5;
            pointer-events: none; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 3. 最頂層：透明觸控層 (確保一定點得到) */
        #touch { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        button {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; padding: 10px 20px;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="box"></div>
    <div id="touch"></div>
    <button onclick="location.reload()">重新整理 (RESET)</button>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const touch = document.getElementById('touch');
        let drawing = false;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.strokeStyle = 'red'; // 改用紅色，確保你看得到線條！
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
        }

        function getXY(e) {
            const r = e.touches ? e.touches[0] : e;
            return { x: r.clientX, y: r.clientY };
        }

        function start(e) {
            drawing = true;
            const p = getXY(e);
            // 強制讓起點位移到旁邊
            ctx.beginPath();
            ctx.moveTo(p.x + 150, p.y + 150); 
            if(e.touches) e.preventDefault();
        }

        function move(e) {
            if (!drawing) return;
            const p = getXY(e);
            // 讓線條永遠距離手指 150 像素
            ctx.lineTo(p.x + 150, p.y + 150);
            ctx.stroke();
            if(e.touches) e.preventDefault();
        }

        touch.addEventListener('touchstart', start, {passive:false});
        touch.addEventListener('touchmove', move, {passive:false});
        window.addEventListener('touchend', () => drawing = false);

        touch.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => drawing = false);

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
