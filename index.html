<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edge Practice</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #2a2a2a; /* 灰底 */
            overflow: hidden;
            touch-action: none;
        }

        /* 中間的白色畫布（純視覺遮蓋） */
        .white-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80vmin; height: 80vmin;
            background-color: white;
            z-index: 5; /* 擋住底下的線條 */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            pointer-events: none; /* 讓觸摸穿透到畫布 */
        }

        /* 畫布放在遮罩下面 */
        #mainCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 2;
            background-color: transparent;
        }

        #resetBtn {
            position: fixed;
            bottom: -80px; left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 15px 30px;
            background: white;
            border: 1px solid #ccc;
            transition: 0.3s;
            cursor: pointer;
        }

        #resetBtn.show { bottom: 40px; }
    </style>
</head>
<body>

    <div class="white-center"></div>
    <canvas id="mainCanvas"></canvas>
    <button id="resetBtn" onclick="resetCanvas()">RESET / 重新開始</button>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('resetBtn');

        let drawing = false;
        let startY = 0;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;
            ctx.lineCap = 'round';
        }

        function getPos(e) {
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY };
        }

        function start(e) {
            drawing = true;
            const pos = getPos(e);
            startY = pos.y;
            // 每次下筆，畫布的四個角落同步準備
            ctx.beginPath();
        }

        function move(e) {
            const pos = getPos(e);

            // 往下滑偵測
            if (!drawing && pos.y - startY > 60) {
                btn.classList.add('show');
            }

            if (!drawing) return;
            if (e.cancelable) e.preventDefault();
