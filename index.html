<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edge Practice - Final Text</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #bdbdbd; /* 淺灰色背景 */
            overflow: hidden; touch-action: none;
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }

        /* 1. 底層：畫布 */
        #mainCanvas {
            position: fixed; top: 0; left: 0; z-index: 1;
        }

        /* 2. 中層：白色遮擋區（在畫布上方） */
        .white-box {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vmin; height: 70vmin;
            background: white; z-index: 5; /* 高於畫布，遮住線條 */
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; /* 讓動作穿透到頂層觸控 */
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* 提示文字樣式 */
        .hint { 
            color: #d0d0d0; 
            font-size: clamp(14px, 2.5vmin, 18px); 
            letter-spacing: 2px;
            font-weight: 300;
            text-align: center;
        }

        /* 3. 頂層：透明觸控層 */
        #touchLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; cursor: crosshair;
        }

        #resetBtn {
            position: fixed; bottom: -80px; left: 50%;
            transform: translateX(-50%); z-index: 100;
            padding: 12px 24px; background: white; border: 1px solid #999;
            border-radius: 4px; transition: 0.3s;
        }
        #resetBtn.show { bottom: 30px; }
    </style>
</head>
<body>

    <canvas id="mainCanvas"></canvas>
    
    <div class="white-box">
        <span class="hint">在這個白色畫布上畫畫</span>
    </div>

    <div id="touchLayer"></div>

    <button id="resetBtn" onclick="location.reload(true)">RESET</button>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const touchLayer = document.getElementById('touchLayer');
        const btn = document.getElementById('resetBtn');

        let isDrawing = false;
        let startY = 0;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.strokeStyle = '#000000'; // 黑色線條
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function getProjectedPos(e) {
            const t = (e.touches && e.touches.length > 0) ? e.touches[0] : e;
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            
            const rx = t.clientX;
            const ry = t.clientY;

            const dx = rx - cx;
            const dy = ry - cy;

            // 保持位移比例，確保線條跳出白色區域
            const multiplier = 2.2; 

            return {
                x: cx + (dx * multiplier),
                y: cy + (dy * multiplier),
                rawY: t.clientY
            };
        }

        function handleStart(e) {
            isDrawing = true;
            const p = getProjectedPos(e);
            startY = p.rawY;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            if (e.cancelable) e.preventDefault();
        }

        function handleMove(e) {
            const p = getProjectedPos(e);
            if (!isDrawing && p.rawY - startY > 80) btn.classList.add('show');
            if (!isDrawing) return;

            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            if (e.cancelable) e.preventDefault();
        }

        function handleEnd() { isDrawing = false; }

        touchLayer.addEventListener('touchstart', handleStart, { passive: false });
        touchLayer.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        touchLayer.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        window.addEventListener('resize', init);
        window.onload = init;
    </script>
</body>
</html>
