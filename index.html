<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edge Practice - Reset Fix</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #bdbdbd; 
            overflow: hidden; touch-action: none;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        #mainCanvas { position: fixed; top: 0; left: 0; z-index: 1; }

        .white-box {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vmin; height: 70vmin;
            background: white; z-index: 5; 
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .hint { 
            color: #d0d0d0; 
            font-size: clamp(14px, 2.5vmin, 18px); 
            letter-spacing: 2px;
            text-align: center;
        }

        #touchLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; cursor: crosshair;
        }

        /* 強化手機版按鈕的可見性與位置 */
        #resetBtn {
            position: fixed; 
            bottom: -100px; /* 初始隱藏位置 */
            left: 50%;
            transform: translateX(-50%); 
            z-index: 100;
            padding: 15px 40px; 
            background: white; 
            border: 1px solid #999;
            border-radius: 50px; /* 改為圓角更適合手機點擊 */
            font-size: 16px;
            color: #333;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            -webkit-appearance: none;
        }

        /* 按鈕顯示時的位置，提高一點以避開手機底部的滑動條 */
        #resetBtn.show { 
            bottom: 50px; 
        }
    </style>
</head>
<body>

    <canvas id="mainCanvas"></canvas>
    
    <div class="white-box">
        <span class="hint">在這個白色畫布上畫畫</span>
    </div>

    <div id="touchLayer"></div>

    <button id="resetBtn" onclick="location.reload(true)">RESET</button>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const touchLayer = document.getElementById('touchLayer');
        const btn = document.getElementById('resetBtn');

        let isDrawing = false;
        let startY = 0;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function getProjectedPos(e) {
            const t = (e.touches && e.touches.length > 0) ? e.touches[0] : e;
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const rx = t.clientX;
            const ry = t.clientY;
            const dx = rx - cx;
            const dy = ry - cy;
            const multiplier = 2.2; 

            return {
                x: cx + (dx * multiplier),
                y: cy + (dy * multiplier),
                rawY: t.clientY
            };
        }

        function handleStart(e) {
            isDrawing = true;
            const p = getProjectedPos(e);
            startY = p.rawY; // 記錄點擊初始位置
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            // 雖然隱藏按鈕，但若使用者再次點擊畫布，可以考慮讓按鈕消失
            btn.classList.remove('show');
            if (e.cancelable) e.preventDefault();
        }

        function handleMove(e) {
            const p = getProjectedPos(e);

            // 手勢判斷優化：
            // 當手指不是在畫圖，且垂直滑動距離超過 50 像素時，觸發按鈕
            if (!isDrawing) {
                const moveDist = p.rawY - startY;
                if (moveDist > 50) {
                    btn.classList.add('show');
                }
            }

            if (!isDrawing) return;

            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            if (e.cancelable) e.preventDefault();
        }

        function handleEnd() { 
            isDrawing = false; 
        }

        touchLayer.addEventListener('touchstart', handleStart, { passive: false });
        touchLayer.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        // 電腦版兼容
        touchLayer.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        window.addEventListener('resize', init);
        window.onload = init;
    </script>
</body>
</html>
