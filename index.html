<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offset Drawing - 偏移練習</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #222; /* 更深的深灰 */
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            overflow: hidden; /* 禁止整體滾動，我們改用手勢偵測 */
        }

        /* 背景畫布 */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            display: block;
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 中央白色畫布感應區：縮小灰邊，擴大白區 */
        .drawing-zone {
            /* 調整這裡來控制灰邊的寬度。
               使用 90vmin 代表佔據螢幕短邊的 90%，
               剩下的 10% 就是灰邊（左右各 5%） */
            width: 90vmin; 
            height: 90vmin;
            background-color: white;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none; 
            cursor: crosshair;
        }

        .hint {
            color: #d1d1d1;
            font-size: 0.8rem;
            letter-spacing: 3px;
            pointer-events: none;
            user-select: none;
            mix-blend-mode: difference; /* 讓文字在線條穿過時仍可見 */
        }

        /* 重新開始按鈕：平常隱藏，下滑手勢時出現 */
        #resetBtn {
            position: fixed;
            bottom: -80px; /* 平常藏在下方 */
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: bottom 0.3s ease-out; /* 出現動畫 */
        }

        #resetBtn.show {
            bottom: 40px; /* 出現時的位置 */
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="main-container">
        <div class="drawing-zone" id="touchZone">
            <span class="hint">DRAW WITHIN</span>
        </div>
    </div>

    <button id="resetBtn" onclick="resetCanvas()">重新開始 / RESET</button>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        const touchZone = document.getElementById('touchZone');
        const resetBtn = document.getElementById('resetBtn');

        let isDrawing = false;
        let centerX, centerY;
        let startY; // 用於偵測下滑手勢

        // 初始化
        function initCanvas() {
            const ratio = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * ratio;
            canvas.height = window.innerHeight * ratio;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            
            ctx.scale(ratio, ratio);
            ctx.strokeStyle = '#ffffff'; // 線條為白色
            ctx.lineWidth = 1;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            // 重新計算螢幕中心點
            centerX = window.innerWidth / 2;
            centerY = window.innerHeight / 2;
        }

        // 偏移繪製核心邏輯
        function getOffsetPos(e) {
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            // 1. 計算手指距離中心的距離
            const deltaX = clientX - centerX;
            const deltaY = clientY - centerY;

            // 2. 將距離反轉 (Mirror effect)，決定線條位置
            // 如果你想線條在同側出現但偏移，把這裡的 "-" 去掉即可
            return {
                x: centerX - deltaX,
                y: centerY - deltaY
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getOffsetPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            
            // 用於偵測是否要往下滑
            if (e.touches) startY = e.touches[0].clientY; 
        }

        function draw(e) {
            // 處理重新開始按鈕的顯示/隱藏
            if (e.touches) {
                const currentY = e.touches[0].clientY;
                // 如果在作畫區域外往下滑動，且未在作畫，顯示按鈕
                if (!isDrawing && currentY - startY > 50) { 
                    resetBtn.classList.add('show');
                }
            }

            if (!isDrawing) return;
            if (e.cancelable) e.preventDefault(); 

            // 限制只有在白色區域內觸摸才會有線條
            const target
