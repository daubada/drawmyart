<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edge Art - Black Line</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #bdbdbd; /* 淺一點點的灰色 */
            overflow: hidden; touch-action: none; 
        }
        
        /* 畫布層 */
        #c { position: fixed; top: 0; left: 0; z-index: 1; }

        /* 白色方塊層 */
        .box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70vmin; height: 70vmin; background: white; z-index: 5;
            pointer-events: none; box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        /* 觸控感應層 */
        #touch { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        button {
            position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%);
            z-index: 100; padding: 12px 24px; background: white; border: 1px solid #999;
            border-radius: 4px; transition: 0.3s;
        }
        button.show { bottom: 30px; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="box"></div>
    <div id="touch"></div>
    <button id="resetBtn" onclick="location.reload()">重新開始 / RESET</button>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const touchLayer = document.getElementById('touch');
        const btn = document.getElementById('resetBtn');

        let drawing = false;
        let startY = 0;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.strokeStyle = 'black'; // 線條顏色改為黑色
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function getOffsetPos(e) {
            const r = e.touches ? e.touches[0] : e;
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const dx = r.clientX - cx;
            const dy = r.clientY - cy;
            // 保持 1.7 倍位移，確保線條被推到白框外的灰區
            return { x: cx + dx * 1.7, y: cy + dy * 1.7, rawY: r.clientY };
        }

        function start(e) {
            drawing = true;
            const p = getOffsetPos(e);
            startY = p.rawY;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            if(e.cancelable) e.preventDefault();
        }
