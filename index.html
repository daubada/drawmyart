<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edge Art - Simple</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #bdbdbd; /* 淺灰色背景 */
            overflow: hidden; touch-action: none;
            font-family: sans-serif;
        }

        /* 1. 底層：畫布 */
        #mainCanvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* 2. 中層：白色遮擋區 */
        .white-box {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vmin; height: 70vmin;
            background: white; z-index: 5; 
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .hint { color: #d0d0d0; font-size: 14px; text-align: center; }

        /* 3. 頂層：透明觸控層 */
        #touchLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; cursor: crosshair;
        }

        /* 固定在底部的小按鈕 */
        #resetBtn {
            position: fixed; 
            bottom: 20px; 
            left: 50%;
            transform: translateX(-50%); 
            z-index: 100;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #999;
            color: #666;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="mainCanvas"></canvas>
    
    <div class="white-box">
        <span class="hint">在這個白色畫布上畫畫</span>
    </div>

    <div id="touchLayer"></div>

    <button id="resetBtn" onclick="location.reload(true)">重置畫布 RESET</button>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const touchLayer = document.getElementById('touchLayer');

        let isDrawing = false;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.strokeStyle = '#000000'; // 黑色筆劃
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function getProjectedPos(e) {
            const t = (e.touches && e.touches.length > 0) ? e.touches[0] : e;
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            
            // 計算手指距離中心的偏移，並放大 2.2 倍投射到邊緣
            const dx = t.clientX - cx;
            const dy = t.clientY - cy;
            const multiplier = 2.2; 

            return {
                x: cx + (dx * multiplier),
                y: cy + (dy * multiplier)
            };
        }

        function handleStart(e) {
            isDrawing = true;
            const p = getProjectedPos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            if (e.cancelable) e.preventDefault();
        }

        function handleMove(e) {
            if (!isDrawing) return;
            const p = getProjectedPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            if (e.cancelable) e.preventDefault();
        }

        function handleEnd() { isDrawing = false; }

        // 事件監聽
        touchLayer.addEventListener('touchstart', handleStart, { passive: false });
        touchLayer.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        touchLayer.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        window.addEventListener('resize', init);
        window.onload = init;
    </script>
</body>
</html>
