<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edge Drawing - 修正版</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #222; /* 灰底 */
            overflow: hidden;
            font-family: sans-serif;
            touch-action: none; /* 禁用瀏覽器手勢，確保能順利畫圖 */
        }

        /* 底部：純粹的視覺方塊 */
        .visual-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80vmin; height: 80vmin;
            background-color: white;
            z-index: 1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 頂層：透明的畫布，負責接收所有點擊與繪圖 */
        #mainCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 10;
            cursor: crosshair;
        }

        /* 按鈕：層級必須最高 */
        #resetBtn {
            position: fixed;
            bottom: -80px; left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 15px 30px;
            background: white;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        #resetBtn.show { bottom: 40px; }
    </style>
</head>
<body>

    <div class="visual-center"></div>
    <canvas id="mainCanvas"></canvas>
    <button id="resetBtn" onclick="resetCanvas()">重新開始 / RESET</button>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const resetBtn = document.getElementById('resetBtn');

        let drawing = false;
        let lastScrollY = 0;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.strokeStyle = '#ffffff'; // 線條顏色
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        // 判斷座標是否在「白區」之外
        function isOutside(x, y) {
            const size = Math.min(window.innerWidth, window.innerHeight) * 0.8;
            const left = (window.innerWidth - size) / 2;
            const right = left + size;
            const top = (window.innerHeight - size) / 2;
            const bottom = top + size;
            
            // 如果座標不在白框範圍內，回傳 true
            return (x < left || x > right || y < top || y > bottom);
        }

        function start(e) {
            drawing = true;
            const pos = getPos(e);
            lastScrollY = pos.y;
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function move(e) {
            const pos = getPos(e);

            // 處理「下滑出現按鈕」：在非繪圖狀態下偵測
            if (!drawing && pos.y - lastScrollY > 50) {
                resetBtn.classList.add('show');
            }

            if (!drawing) return;

            // 關鍵邏輯：只有在座標屬於「外部灰色地帶」時才執行繪製線條
            // 當手指在白區內時，moveTo 會更新座標但不畫線，直到手指移出去
            if (isOutside(pos.x, pos.y)) {
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            } else {
                ctx.moveTo(pos.x, pos.y);
            }
        }

        function stop() {
            drawing = false;
        }

        function getPos(e) {
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY };
        }

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            resetBtn.classList.remove('show');
        }

        // 監聽畫布事件
        canvas.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 徹底防止 Chrome 的下拉刷新
            start(e);
        }, { passive: false });
        
        window.addEventListener('touchmove', (e) => {
            if (drawing) e.preventDefault();
            move(e);
        }, { passive: false });
        
        window.addEventListener('touchend', stop);

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
