<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edge Art - Final Fix</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #d0d0d0; /* 淺灰色 */
            overflow: hidden; touch-action: none; 
            font-family: sans-serif;
        }
        
        #c { position: fixed; top: 0; left: 0; z-index: 1; }

        .box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 75vmin; height: 75vmin; background: white; z-index: 5;
            pointer-events: none; display: flex; align-items: center; justify-content: center;
        }

        .hint { color: #aaa; font-size: 14px; letter-spacing: 2px; }

        #touch { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        #resetBtn {
            position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%);
            z-index: 100; padding: 12px 24px; background: white; border: 1px solid #999;
            border-radius: 4px; transition: 0.3s;
        }
        #resetBtn.show { bottom: 30px; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="box"><span class="hint">在此繪製痕跡</span></div>
    <div id="touch"></div>
    <button id="resetBtn" onclick="location.reload(true)">RESET</button>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const touchLayer = document.getElementById('touch');
        const btn = document.getElementById('resetBtn');

        let drawing = false;
        let lastY = 0;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.strokeStyle = '#000000'; // 黑色線條
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function getOffsetPos(e) {
            const r = e.touches ? e.touches[0] : e;
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            
            // 計算手指距離中心的物理距離
            const dx = r.clientX - cx;
            const dy = r.clientY - cy;

            // 位移邏輯修正：將座標往邊緣推移，但不超過螢幕邊界
            // 我們把線條位置設定在：手指座標 + (向外的偏移量)
            // 這樣不管你在中間哪裡畫，線條都會被「擠」出白框
            const pushX = dx > 0 ? 100 : -100;
            const pushY = dy > 0 ? 100 : -100;

            return { x: r.clientX + pushX, y: r.clientY + pushY, rawY: r.clientY };
        }

        function start(e) {
            drawing = true;
            const p = getOffsetPos(e);
            lastY = p.rawY;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            if(e.cancelable) e.preventDefault();
        }

        function move(e) {
            const p = getOffsetPos(e);
            // 偵測下滑出現按鈕
            if (!drawing && p.rawY - lastY > 60) btn.classList.add('show');
            
            if (!drawing) return;
            
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            if(e.cancelable) e.preventDefault();
        }

        touchLayer.addEventListener('touchstart', start, {passive:false});
        touchLayer.addEventListener('touchmove', move, {passive:false});
        window.addEventListener('touchend', () => drawing = false);

        touchLayer.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
