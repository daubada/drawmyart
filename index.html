<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edge Only Drawing</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a; /* 深灰背景 */
            overflow: hidden;
            touch-action: none;
        }

        /* 畫布：放在最底層 */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 白色畫布：放在畫布上方，遮住中間的線條 */
        .white-plate {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vmin; /* 稍微縮小一點點，讓灰邊明顯一點 */
            height: 85vmin;
            background-color: white;
            z-index: 5; /* 確保在線條上方 */
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hint {
            color: #eee;
            font-size: 0.7rem;
            letter-spacing: 5px;
            pointer-events: none;
        }

        /* 按鈕區 */
        #resetBtn {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 2px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #resetBtn.active {
            bottom: 40px;
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>
    
    <div class="white-plate" id="touchArea">
        </div>

    <button id="resetBtn" onclick="clearAll()">RESET</button>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        const touchArea = document.getElementById('touchArea');
        const btn = document.getElementById('resetBtn');

        let drawing = false;
        let lastY = 0;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
        }

        function handleStart(e) {
            drawing = true;
            const pos = getPos(e);
            lastY = pos.rawY;
            // 計算偏移：將座標往外推 100 像素
            const offsetPos = calculateOffset(pos.x, pos.y);
            ctx.beginPath();
            ctx.moveTo(offsetPos.x, offsetPos.y);
        }

        function handleMove(e) {
            const pos = getPos(e);
            
            // 偵測下滑顯現按鈕
            if (!drawing && pos.rawY - lastY > 30) {
                btn.classList.add('active');
            }

            if (!drawing) return;

            // 核心偏移邏輯：
            // 手指在中心畫，我們把線條座標強制加/減去畫布寬度的一半以上
            // 讓線條直接跳過白區，出現在灰邊
            const offsetPos = calculateOffset(pos.x, pos.y);
            
            ctx.lineTo(offsetPos.x, offsetPos.y);
            ctx.stroke();
        }

        function calculateOffset(x, y) {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const dist = 0.45; // 偏移係數

            // 將筆跡從中心向外推擠
            const dx = x - cx;
            const dy = y - cy;
            
            // 如果你在左半邊畫，線條就往更左邊推；右半邊同理
            return {
                x: x + (dx > 0 ? 100 : -100), 
                y: y + (dy > 0 ? 100 : -100)
            };
        }

        function getPos(e) {
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY, rawY: t.clientY };
        }

        function stop() {
            drawing = false;
        }

        function clearAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            btn.classList.remove('active');
        }

        touchArea.addEventListener('touchstart', handleStart);
        window.addEventListener('touchmove', handleMove, {passive:false});
        window.addEventListener('touchend', stop);
        
        touchArea.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', stop);

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
